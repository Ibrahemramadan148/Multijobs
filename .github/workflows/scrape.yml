name: Multi-Source Job Scraper

on:
  repository_dispatch:
    types: [run-scraper]
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests==2.31.0 beautifulsoup4==4.12.3 lxml==5.2.1

      - name: Run scraper
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          LI_AT_COOKIE:       ${{ secrets.LI_AT_COOKIE }}
          INDEED_COOKIE:      ${{ secrets.INDEED_COOKIE }}
          BAYT_COOKIE:        ${{ secrets.BAYT_COOKIE }}
          WUZZUF_COOKIE:      ${{ secrets.WUZZUF_COOKIE }}
        run: python scraper.py

      - name: Commit seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push
